<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>Note Diary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 1fr;
      height: 100vh;
      color: #333;
      background: #f5f5f5;
    }

    /* ===== 侧边栏 ===== */
    .sidebar {
      background: #2c2c2c;
      color: #ccc;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1a1a1a;
    }

    /* 侧边栏标签切换 */
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #3a3a3a;
    }

    .sidebar-tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-size: 0.82rem;
      text-align: center;
      transition: color 0.15s, background 0.15s;
      border-bottom: 2px solid transparent;
    }

    .sidebar-tab:hover {
      color: #ccc;
      background: #333;
    }

    .sidebar-tab.active {
      color: #fff;
      border-bottom-color: #6c9fff;
      font-weight: 600;
    }

    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid #3a3a3a;
    }

    .btn-new-note {
      width: 100%;
      padding: 8px 0;
      border: 1px solid #4a4a4a;
      border-radius: 6px;
      background: #3a3a3a;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s;
    }

    .btn-new-note:hover {
      background: #4a4a4a;
    }

    /* 排序控件 */
    .sort-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border-bottom: 1px solid #3a3a3a;
    }

    .sort-controls select {
      flex: 1;
      padding: 4px 6px;
      border: 1px solid #4a4a4a;
      border-radius: 4px;
      background: #3a3a3a;
      color: #ccc;
      font-size: 0.75rem;
      outline: none;
      cursor: pointer;
    }

    .sort-dir-btn {
      width: 26px;
      height: 26px;
      border: 1px solid #4a4a4a;
      border-radius: 4px;
      background: #3a3a3a;
      color: #888;
      cursor: pointer;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }

    .sort-dir-btn:hover {
      background: #4a4a4a;
      color: #ccc;
    }

    .sort-dir-btn.active {
      background: #4a6a9a;
      border-color: #6c9fff;
      color: #fff;
    }

    /* 回收站操作 */
    .trash-actions {
      padding: 8px 16px;
      border-bottom: 1px solid #3a3a3a;
    }

    .btn-empty-trash {
      width: 100%;
      padding: 6px 0;
      border: 1px solid #6a3a3a;
      border-radius: 4px;
      background: #4a2a2a;
      color: #f66;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.15s;
    }

    .btn-empty-trash:hover {
      background: #6a3a3a;
    }

    .note-list {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 4px 0;
    }

    /* 回收站笔记项 */
    .note-item.trash-item .title {
      color: #999;
    }

    .note-item.trash-item .meta {
      color: #666;
      font-size: 0.65rem;
    }

    .note-list .empty {
      text-align: center;
      color: #666;
      margin-top: 40px;
      font-size: 0.85rem;
    }

    .note-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }

    .note-item:hover {
      background: #333;
    }

    .note-item.active {
      background: #3a3a3a;
      border-left-color: #6c9fff;
      color: #fff;
    }

    .note-item .title {
      font-size: 0.9rem;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item .meta {
      font-size: 0.7rem;
      color: #777;
    }

    .note-item.active .meta {
      color: #999;
    }

    /* ===== 主区域 ===== */
    .main-area {
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
    }

    /* 工具栏 */
    .toolbar {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
    }

    .toolbar-tabs {
      display: flex;
      gap: 0;
      padding: 4px 12px 0;
    }

    .toolbar-tab {
      padding: 6px 18px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      cursor: pointer;
      font-size: 0.82rem;
      color: #888;
      transition: color 0.15s, border-color 0.15s;
      border-radius: 0;
    }

    .toolbar-tab:hover {
      color: #555;
    }

    .toolbar-tab.active {
      color: #333;
      border-bottom-color: #6c9fff;
      font-weight: 600;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px 8px;
    }

    .toolbar button {
      padding: 6px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.82rem;
      color: #444;
      transition: background 0.1s, border-color 0.1s;
    }

    .toolbar button:hover {
      background: #eee;
      border-color: #bbb;
    }

    .toolbar button:active {
      background: #ddd;
    }

    .toolbar button:disabled {
      opacity: 0.4;
      cursor: default;
      background: #f5f5f5;
    }

    /* 样式图标按钮（无文字，仅图标） */
    .toolbar .style-btn {
      position: relative;
      padding: 6px 10px;
      font-size: 0.9rem;
      min-width: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .toolbar .style-btn.active {
      background: #d6e4f0;
      border-color: #6c9fff;
      color: #1a56b0;
    }

    /* 自定义 tooltip，悬浮 0.5s 后显示 */
    .toolbar .style-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 8px;
      background: #333;
      color: #fff;
      font-size: 0.72rem;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
    }

    .toolbar .style-btn:hover::after {
      opacity: 1;
      transition-delay: 0.5s;
    }

    .toolbar .separator {
      width: 1px;
      height: 22px;
      background: #d0d0d0;
      margin: 0 4px;
    }

    .toolbar select {
      padding: 6px 8px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.82rem;
      color: #444;
      outline: none;
    }

    .toolbar select:hover {
      border-color: #bbb;
    }

    .toolbar .color-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.82rem;
      color: #444;
      transition: background 0.1s, border-color 0.1s;
    }

    .toolbar .color-btn:hover {
      background: #eee;
      border-color: #bbb;
    }

    .toolbar .color-btn input[type="color"] {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .toolbar .color-swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 2px;
      border: 1px solid #ccc;
      margin-left: 2px;
      vertical-align: middle;
    }

    /* 清单复选框 */
    .editor-content .check-box {
      display: inline;
      cursor: pointer;
      user-select: none;
      margin-right: 4px;
      font-size: 1rem;
    }

    /* 已勾选的清单行：删除线 + 淡化 */
    .checklist-checked {
      text-decoration: line-through;
      opacity: 0.5;
    }

    /* 对齐条形图标 */
    .align-bars {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 18px;
      height: 16px;
      justify-content: center;
    }

    .align-bars span {
      display: block;
      height: 2px;
      background: #444;
      border-radius: 1px;
    }

    .style-btn.active .align-bars span {
      background: #1a56b0;
    }

    /* 左对齐：左端齐平 */
    .align-left span:nth-child(1) { width: 16px; }
    .align-left span:nth-child(2) { width: 12px; margin-left: 0; }
    .align-left span:nth-child(3) { width: 14px; margin-left: 0; }

    /* 居中：三根横线居中 */
    .align-center span:nth-child(1) { width: 10px; margin: 0 auto; }
    .align-center span:nth-child(2) { width: 16px; margin: 0 auto; }
    .align-center span:nth-child(3) { width: 12px; margin: 0 auto; }

    /* 右对齐：右端齐平 */
    .align-right span:nth-child(1) { width: 16px; margin-left: auto; }
    .align-right span:nth-child(2) { width: 12px; margin-left: auto; }
    .align-right span:nth-child(3) { width: 14px; margin-left: auto; }

    /* 编辑区标题输入 */
    .editor-title-input {
      width: 100%;
      padding: 16px 24px 8px;
      border: none;
      border-bottom: 2px solid transparent;
      outline: none;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
      color: #333;
      background: transparent;
      transition: border-color 0.15s;
    }

    .editor-title-input:focus {
      border-bottom-color: #6c9fff;
    }

    .editor-title-input::placeholder {
      color: #ccc;
    }

    /* 编辑区 */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .editor-area .no-note {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #bbb;
      font-size: 1.1rem;
      user-select: none;
    }

    .editor-area .editor-content {
      flex: 1;
      border: none;
      outline: none;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 20px 24px;
      font-size: 0.95rem;
      line-height: 1.8;
      font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
      color: #333;
    }

    .editor-area .editor-content:empty::before {
      content: '在这里开始记录...';
      color: #ccc;
    }

    /* 关闭当前笔记按钮 */
    .btn-close-note {
      position: absolute;
      top: 8px;
      right: 12px;
      z-index: 10;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: #999;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .btn-close-note:hover {
      background: #e0e0e0;
      color: #555;
    }

    /* ===== 右键上下文菜单 ===== */
    .context-menu {
      display: none;
      position: fixed;
      z-index: 9999;
      background: #333;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px 0;
      min-width: 150px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .context-menu.visible {
      display: block;
    }

    .context-menu .menu-item {
      padding: 8px 16px;
      cursor: pointer;
      color: #ddd;
      font-size: 0.85rem;
      transition: background 0.1s;
    }

    .context-menu .menu-item:hover {
      background: #4a4a4a;
      color: #fff;
    }

    .context-menu .menu-item.danger {
      color: #f66;
    }

    .context-menu .menu-item.danger:hover {
      background: #a33;
      color: #fff;
    }

    .context-menu .menu-divider {
      height: 1px;
      background: #555;
      margin: 4px 8px;
    }

    /* ===== 侧边栏内联重命名 ===== */
    .note-item .rename-input {
      width: calc(100% - 8px);
      padding: 2px 4px;
      border: 1px solid #6c9fff;
      border-radius: 3px;
      background: #444;
      color: #fff;
      font-size: 0.88rem;
      outline: none;
    }

    /* 状态栏 */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 4px 12px;
      border-top: 1px solid #e8e8e8;
      background: #fafafa;
      font-size: 0.72rem;
      color: #999;
    }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-view="workspace" id="tab-workspace">📁 工作区</button>
      <button class="sidebar-tab" data-view="trash" id="tab-trash">🗑 回收站</button>
    </div>
    <!-- 工作区页眉 -->
    <div class="sidebar-header" id="sidebar-header-workspace">
      <button class="btn-new-note" id="btn-sidebar-new">+ 新建笔记</button>
    </div>
    <!-- 排序控件 -->
    <div class="sort-controls" id="sort-controls">
      <select id="sort-by">
        <option value="mtime">修改时间</option>
        <option value="name">名称</option>
        <option value="created">创建时间</option>
      </select>
      <button class="sort-dir-btn" id="sort-asc" title="升序">↑</button>
      <button class="sort-dir-btn active" id="sort-desc" title="倒序">↓</button>
    </div>
    <!-- 回收站页眉 -->
    <div class="trash-actions" id="trash-actions" style="display:none">
      <button class="btn-empty-trash" id="btn-empty-trash">🗑 清空回收站</button>
    </div>
    <div class="note-list" id="note-list">
      <div class="empty">暂无笔记<br>点击上方按钮创建</div>
    </div>
  </aside>

  <!-- 主区域 -->
  <div class="main-area">
    <div class="toolbar">
      <div class="toolbar-tabs">
        <button class="toolbar-tab active" data-tab="file">📁 文件</button>
        <button class="toolbar-tab" data-tab="style">🎨 样式</button>
        <button class="toolbar-tab" data-tab="insert">📥 插入</button>
      </div>
      <div class="toolbar-actions" id="toolbar-file">
        <button id="btn-new" title="新建笔记 (Ctrl+N)">新建</button>
        <button id="btn-open" title="导入外部文件">导入</button>
        <span class="separator"></span>
        <button id="btn-undo" title="撤销 (Ctrl+Z)" disabled>↩ 撤销</button>
        <button id="btn-redo" title="重做 (Ctrl+Y)" disabled>↪ 重做</button>
        <span class="separator"></span>
        <button id="btn-save" title="保存笔记 (Ctrl+S)">💾 保存</button>
        <span class="separator"></span>
      </div>
      <div class="toolbar-actions" id="toolbar-style" style="display:none">
        <button id="btn-bold" class="style-btn" data-tooltip="加粗 (Ctrl+B)"><b>B</b></button>
        <button id="btn-italic" class="style-btn" data-tooltip="倾斜 (Ctrl+I)"><i>I</i></button>
        <button id="btn-underline" class="style-btn" data-tooltip="下划线 (Ctrl+U)"><u>U</u></button>
        <span class="separator"></span>
        <select id="btn-font-family" title="字体选择">
          <option value="">字体</option>
          <option value="Microsoft YaHei">微软雅黑</option>
          <option value="SimSun">宋体</option>
          <option value="KaiTi">楷体</option>
          <option value="FangSong">仿宋</option>
          <option value="SimHei">黑体</option>
          <option value="Arial">Arial</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Courier New">Courier New</option>
          <option value="Georgia">Georgia</option>
          <option value="Verdana">Verdana</option>
        </select>
        <select id="btn-font-size" title="字号选择">
          <option value="">字号</option>
          <option value="1">12px</option>
          <option value="2">14px</option>
          <option value="3">16px</option>
          <option value="4">18px</option>
          <option value="5">20px</option>
          <option value="6">24px</option>
          <option value="7">30px</option>
          <option value="8">36px</option>
          <option value="9">48px</option>
        </select>
        <span class="separator"></span>
        <button id="btn-align-left" class="style-btn" data-tooltip="左对齐">
          <span class="align-bars align-left"><span></span><span></span><span></span></span>
        </button>
        <button id="btn-align-center" class="style-btn" data-tooltip="居中对齐">
          <span class="align-bars align-center"><span></span><span></span><span></span></span>
        </button>
        <button id="btn-align-right" class="style-btn" data-tooltip="右对齐">
          <span class="align-bars align-right"><span></span><span></span><span></span></span>
        </button>
        <span class="separator"></span>
        <span class="color-btn" title="字体颜色">
          A<span class="color-swatch" id="swatch-forecolor" style="background:#333"></span>
          <input type="color" id="btn-forecolor" value="#333333">
        </span>
        <span class="color-btn" title="字体底色">
          <span class="color-swatch" id="swatch-hilitecolor" style="background:#ff0"></span>
          <input type="color" id="btn-hilitecolor" value="#ffff00">
        </span>
        <span class="separator"></span>
        <button id="btn-format-painter" class="style-btn" data-tooltip="格式刷">🖌</button>
      </div>
      <div class="toolbar-actions" id="toolbar-insert" style="display:none">
        <button id="btn-checklist" class="style-btn" data-tooltip="插入清单">☑ 清单</button>
        <button id="btn-timestamp" class="style-btn" data-tooltip="插入日志时间">📅 日志</button>
      </div>
    </div>

    <div class="editor-area" id="editor-area">
      <div class="no-note">选择或新建一篇笔记开始编辑</div>
    </div>

    <div class="status-bar">
      <span id="status-left">就绪</span>
      <span id="status-right"></span>
    </div>
  </div>

  <!-- 右键上下文菜单（笔记项） -->
  <div class="context-menu" id="context-menu">
    <div class="menu-item" data-action="rename">✏️ 重命名</div>
    <div class="menu-item" data-action="duplicate">📋 复制</div>
    <div class="menu-item" data-action="cut">✂️ 剪切</div>
    <div class="menu-divider"></div>
    <div class="menu-item danger" data-action="delete">🗑️ 删除</div>
  </div>

  <!-- 右键上下文菜单（侧边栏空白区域） -->
  <div class="context-menu" id="context-menu-empty">
    <div class="menu-item" data-action="new-note">📝 新建笔记</div>
    <div class="menu-item" data-action="import-note">📥 导入笔记</div>
  </div>

  <!-- 右键上下文菜单（回收站笔记） -->
  <div class="context-menu" id="context-menu-trash">
    <div class="menu-item" data-action="restore">↩ 恢复</div>
    <div class="menu-divider"></div>
    <div class="menu-item danger" data-action="delete-permanent">🗑 永久删除</div>
  </div>

  <!-- 隐藏的文件选择器用于导入 -->
  <input type="file" id="import-file-input" accept=".txt,.md,.markdown" style="display:none">

  <script>
    (function () {
      // ---- 状态 ----
      let notes = [];
      let currentNote = null;        // { fileName, filePath, displayName, mtime }
      let currentContent = '';
      let saveTimer = null;
      let lastSavedContent = '';

      // ---- DOM 引用 ----
      const noteListEl = document.getElementById('note-list');
      const editorArea = document.getElementById('editor-area');
      const btnUndo = document.getElementById('btn-undo');
      const btnRedo = document.getElementById('btn-redo');
      const statusLeft = document.getElementById('status-left');

      let editorDiv = null;
      let editorTitleInput = null;

      // ---- 排序 / 视图状态 ----
      let activeView = 'workspace'; // 'workspace' | 'trash'
      let sortBy = 'mtime';
      let sortDir = 'desc';

      // ---- 样式工具栏 DOM ----
      const btnBold = document.getElementById('btn-bold');
      const btnItalic = document.getElementById('btn-italic');
      const btnUnderline = document.getElementById('btn-underline');
      const btnFontFamily = document.getElementById('btn-font-family');
      const btnFontSize = document.getElementById('btn-font-size');
      const btnAlignLeft = document.getElementById('btn-align-left');
      const btnAlignCenter = document.getElementById('btn-align-center');
      const btnAlignRight = document.getElementById('btn-align-right');
      const btnForecolor = document.getElementById('btn-forecolor');
      const btnHilitecolor = document.getElementById('btn-hilitecolor');
      const swatchForecolor = document.getElementById('swatch-forecolor');
      const swatchHilitecolor = document.getElementById('swatch-hilitecolor');
      const btnFormatPainter = document.getElementById('btn-format-painter');

      // ---- 格式刷状态 ----
      let formatPainterActive = false;
      let savedFormat = null;

      // ---- 右键菜单 DOM ----
      const contextMenu = document.getElementById('context-menu');
      const contextMenuEmpty = document.getElementById('context-menu-empty');
      const contextMenuTrash = document.getElementById('context-menu-trash');
      const importFileInput = document.getElementById('import-file-input');
      let contextNote = null; // 当前右键操作的笔记对象

      // ---- 渲染笔记列表 ----
      function renderNoteList() {
        noteListEl.innerHTML = '';
        if (activeView !== 'workspace') return;
        if (notes.length === 0) {
          noteListEl.innerHTML = '<div class="empty">暂无笔记<br>点击上方按钮创建</div>';
          return;
        }
        notes.forEach(n => {
          const div = document.createElement('div');
          div.className = 'note-item' + (currentNote && currentNote.filePath === n.filePath ? ' active' : '');
          div.innerHTML = `<div class="title">${escapeHtml(n.displayName)}</div>
                           <div class="meta">${formatDate(n.mtime)}</div>`;
          div.addEventListener('click', () => selectNote(n));
          div.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showContextMenu(e, n);
          });
          noteListEl.appendChild(div);
        });
      }

      /** 渲染回收站列表 */
      function renderTrashList() {
        noteListEl.innerHTML = '';
        if (activeView !== 'trash') return;
        if (trashNotes.length === 0) {
          noteListEl.innerHTML = '<div class="empty">回收站为空</div>';
          return;
        }
        trashNotes.forEach(n => {
          const div = document.createElement('div');
          div.className = 'note-item trash-item';
          div.innerHTML = `<div class="title">${escapeHtml(n.displayName)}</div>
                           <div class="meta">删除于 ${formatDate(n.deletedAt)}</div>`;
          div.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showTrashContextMenu(e, n);
          });
          noteListEl.appendChild(div);
        });
      }

      // ---- 加载笔记列表 ----
      async function loadNoteList() {
        notes = await window.electronAPI.listNotes({ sortBy, sortDir });
        renderNoteList();
      }

      // ---- 加载回收站列表 ----
      let trashNotes = [];
      async function loadTrashList() {
        trashNotes = await window.electronAPI.listTrash();
        renderTrashList();
      }

      // ---- 选择笔记 ----
      async function selectNote(note) {
        if (currentNote && currentNote.filePath === note.filePath) return;
        // 在 async gap 前清空 currentNote，防止 autoSave 写入错误的笔记
        const prevNote = currentNote;
        currentNote = null;
        if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
        // 保存上一个笔记（此时 textarea 仍有效）
        if (prevNote && editorDiv) {
          const content = editorDiv.innerHTML;
          if (content !== lastSavedContent) {
            await window.electronAPI.saveNote(prevNote.filePath, content);
          }
        }
        currentNote = note;
        currentContent = await window.electronAPI.readNote(note.filePath);
        // 兼容旧纯文本笔记：将换行转换为 HTML <br>
        if (!/^\s*</.test(currentContent)) {
          currentContent = currentContent.split('\n').map(line =>
            line ? escapeHtml(line) : '<br>'
          ).join('<br>');
        }
        lastSavedContent = currentContent;
        showEditor();
        editorTitleInput.value = note.displayName;
        editorDiv.innerHTML = currentContent;
        editorDiv.focus();
        renderNoteList();
        updateStatus();
      }

      // ---- 新建笔记 ----
      async function createNewNote() {
        await saveCurrentNote();
        const defaultName = await window.electronAPI.getNextDefaultName();
        const title = defaultName.title;
        const result = await window.electronAPI.createNote(title);
        currentNote = { filePath: result.filePath, fileName: result.fileName, displayName: title, mtime: Date.now() };
        currentContent = '';
        lastSavedContent = '';
        showEditor();
        editorTitleInput.value = title;
        editorDiv.innerHTML = '';
        editorDiv.focus();
        await loadNoteList();
        renderNoteList();
        updateStatus();
      }

      // ---- 保存当前笔记 ----
      async function saveCurrentNote() {
        if (!currentNote || !editorDiv) return;
        const content = editorDiv.innerHTML;
        if (content === lastSavedContent) return;
        const ok = await window.electronAPI.saveNote(currentNote.filePath, content);
        if (ok) {
          lastSavedContent = content;
          currentNote.mtime = Date.now();
          statusLeft.textContent = '已保存';
          setTimeout(() => { if (statusLeft.textContent === '已保存') updateStatus(); }, 1500);
        }
      }

      // ---- 自动保存（防抖）—— 已禁用 ----
      // function autoSave() {
      //   if (saveTimer) clearTimeout(saveTimer);
      //   saveTimer = setTimeout(async () => {
      //     if (editorDiv && editorDiv.innerHTML !== lastSavedContent) {
      //       pushUndo(lastSavedContent);
      //     }
      //     await saveCurrentNote();
      //     await loadNoteList();
      //     renderNoteList();
      //   }, 500);
      // }

      // ---- 手动保存 ----
      async function manualSave() {
        if (!currentNote || !editorDiv) return;
        const content = editorDiv.innerHTML;
        if (content === lastSavedContent) return;
        const ok = await window.electronAPI.saveNote(currentNote.filePath, content);
        if (ok) {
          lastSavedContent = content;
          currentNote.mtime = Date.now();
          statusLeft.textContent = '已保存';
          setTimeout(() => { if (statusLeft.textContent === '已保存') updateStatus(); }, 1500);
          await loadNoteList();
          renderNoteList();
        }
      }

      // ---- 关闭当前笔记 ----
      async function closeCurrentNote() {
        if (!currentNote) return;
        // 先保存当前内容
        if (editorDiv) {
          const content = editorDiv.innerHTML;
          if (content !== lastSavedContent) {
            await window.electronAPI.saveNote(currentNote.filePath, content);
          }
        }
        if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
        currentNote = null;
        currentContent = '';
        lastSavedContent = '';
        hideEditor();
        updateStatus();
      }

      // ---- 编辑器显示/隐藏 ----
      function showEditor() {
        editorArea.innerHTML = '';
        const closeBtn = document.createElement('button');
        closeBtn.className = 'btn-close-note';
        closeBtn.textContent = '×';
        closeBtn.title = '关闭当前笔记';
        closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeCurrentNote(); });
        editorArea.appendChild(closeBtn);
        editorTitleInput = document.createElement('input');
        editorTitleInput.type = 'text';
        editorTitleInput.className = 'editor-title-input';
        editorTitleInput.placeholder = '笔记标题...';
        editorTitleInput.addEventListener('keydown', async (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            if (currentNote) {
              const newTitle = editorTitleInput.value.trim();
              if (newTitle && newTitle !== currentNote.displayName) {
                const result = await window.electronAPI.renameNote(currentNote.filePath, newTitle);
                if (result) {
                  currentNote.filePath = result.filePath;
                  currentNote.fileName = result.fileName;
                  currentNote.displayName = newTitle;
                  await loadNoteList();
                  renderNoteList();
                  updateStatus();
                  statusLeft.textContent = '已重命名';
                }
              }
            }
            editorDiv && editorDiv.focus();
          }
        });
        editorArea.appendChild(editorTitleInput);
        editorDiv = document.createElement('div');
        editorDiv.className = 'editor-content';
        editorDiv.contentEditable = 'true';
        editorDiv.addEventListener('input', onEditorInput);
        editorDiv.addEventListener('keydown', onEditorKeydown);
        editorArea.appendChild(editorDiv);
      }

      function hideEditor() {
        editorArea.innerHTML = '<div class="no-note">选择或新建一篇笔记开始编辑</div>';
        editorDiv = null;
        editorTitleInput = null;
      }

      // ---- 编辑事件 ----
      function onEditorInput() {
        updateUndoRedoButtons();
      }

      function onEditorKeydown(e) {
        if (e.ctrlKey && e.key === 'n') {
          e.preventDefault();
          createNewNote();
        } else if (e.ctrlKey && e.key === 's') {
          e.preventDefault();
          manualSave();
        }
      }

      // ---- 撤销/重做（使用浏览器原生 contenteditable 机制） ----
      /**
       * 更新撤销/重做按钮的启用状态
       */
      function updateUndoRedoButtons() {
        try {
          btnUndo.disabled = !document.queryCommandEnabled('undo');
          btnRedo.disabled = !document.queryCommandEnabled('redo');
        } catch (_) {
          // queryCommandEnabled 可能抛异常，忽略
        }
      }

      // ---- 状态栏 ----
      function updateStatus() {
        if (currentNote) {
          statusLeft.textContent = `当前: ${currentNote.displayName}`;
        } else {
          statusLeft.textContent = '就绪';
        }
      }

      // ---- 工具函数 ----
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function formatDate(ts) {
        const d = new Date(ts);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }

      /**
       * 解析"新建笔记本*"格式的笔记名称，提取序号
       * @param {string} displayName - 笔记显示名称
       * @returns {number|null} 序号（"新建笔记本"返回1，"新建笔记本 (2)"返回2），不匹配返回 null
       */
      function parseDefaultNameNumber(displayName) {
        if (displayName === '新建笔记本') return 1;
        const match = displayName.match(/^新建笔记本 \((\d+)\)$/);
        return match ? parseInt(match[1], 10) : null;
      }

      // ---- 右键菜单 ----
      /**
       * 显示右键上下文菜单
       * @param {MouseEvent} e - 鼠标事件
       * @param {object} note - 笔记对象
       */
      function showContextMenu(e, note) {
        contextNote = note;
        contextMenu.style.left = e.clientX + 'px';
        contextMenu.style.top = e.clientY + 'px';
        contextMenu.classList.add('visible');
      }

      /**
       * 隐藏右键上下文菜单
       */
      function hideContextMenu() {
        contextMenu.classList.remove('visible');
        contextNote = null;
      }

      /**
       * 显示侧边栏空白区域右键菜单
       * @param {MouseEvent} e - 鼠标事件
       */
      function showEmptyContextMenu(e) {
        e.preventDefault();
        contextMenuEmpty.style.left = e.clientX + 'px';
        contextMenuEmpty.style.top = e.clientY + 'px';
        contextMenuEmpty.classList.add('visible');
      }

      /**
       * 隐藏侧边栏空白区域右键菜单
       */
      function hideEmptyContextMenu() {
        contextMenuEmpty.classList.remove('visible');
      }

      /**
       * 导入外部文本文件作为新笔记
       */
      async function handleImportNote() {
        hideEmptyContextMenu();
        importFileInput.value = '';
        importFileInput.click();
      }

      // ---- 笔记操作 ----
      /**
       * 删除当前右键选中的笔记
       */
      async function handleDelete() {
        if (!contextNote) return;
        const name = contextNote.displayName;
        // 如果删除的是当前笔记，先关闭（保存内容 + 清空状态），避免编辑框残留指向已删除文件
        const isCurrentNote = currentNote && currentNote.filePath === contextNote.filePath;
        if (isCurrentNote) {
          await closeCurrentNote();
        }

        const nameNumber = parseDefaultNameNumber(name);
        const ok = await window.electronAPI.deleteNote(contextNote.filePath);
        if (ok) {
          if (nameNumber !== null) {
            await window.electronAPI.releaseNameNumber(nameNumber);
          }
          statusLeft.textContent = `已移至回收站: ${name}`;
          await loadNoteList();
          // 删除的是当前笔记：有剩余则打开第一篇，无则回欢迎页
          if (isCurrentNote) {
            if (notes.length > 0) {
              await selectNote(notes[0]);
            }
          }
          updateStatus();
        }
        hideContextMenu();
      }

      /**
       * 复制（创建副本）当前右键选中的笔记
       */
      async function handleDuplicate() {
        if (!contextNote) return;
        const result = await window.electronAPI.duplicateNote(contextNote.filePath);
        if (result) {
          statusLeft.textContent = `已复制: ${contextNote.displayName}`;
          await loadNoteList();
          renderNoteList();
        }
        hideContextMenu();
      }

      /**
       * 剪切当前右键选中的笔记（移至剪贴板目录）
       */
      async function handleCut() {
        if (!contextNote) return;

        // 如果剪切的是当前笔记，先关闭再移动文件
        const isCurrentNote = currentNote && currentNote.filePath === contextNote.filePath;
        if (isCurrentNote) {
          await closeCurrentNote();
        }

        const result = await window.electronAPI.cutNote(contextNote.filePath);
        if (result) {
          statusLeft.textContent = `已剪切: ${contextNote.displayName}`;
          await loadNoteList();
          renderNoteList();
          if (isCurrentNote) {
            if (notes.length > 0) {
              await selectNote(notes[0]);
            } else {
              await createNewNote();
            }
          }
          updateStatus();
        }
        hideContextMenu();
      }

      /**
       * 开始内联重命名侧边栏中的笔记项
       * @param {object} note - 笔记对象
       */
      async function startRename() {
        if (!contextNote) return;
        const note = contextNote;
        hideContextMenu();

        // 在侧边栏中找到对应 DOM 元素
        const items = noteListEl.querySelectorAll('.note-item');
        let targetItem = null;
        items.forEach(item => {
          const titleEl = item.querySelector('.title');
          if (titleEl && titleEl.textContent === note.displayName) {
            targetItem = item;
          }
        });
        if (!targetItem) return;

        const titleEl = targetItem.querySelector('.title');
        const oldTitle = note.displayName;

        // 替换为 input
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'rename-input';
        input.value = oldTitle;
        titleEl.replaceWith(input);
        input.focus();
        input.select();

        /**
         * 确认重命名
         */
        const confirmRename = async () => {
          const newTitle = input.value.trim();
          if (!newTitle || newTitle === oldTitle) {
            // 取消：还原 title
            input.replaceWith(titleEl);
            return;
          }
          const result = await window.electronAPI.renameNote(note.filePath, newTitle);
          if (result) {
            statusLeft.textContent = `已重命名: ${oldTitle} → ${newTitle}`;
            await loadNoteList();
            // 如果重命名的是当前打开的笔记，更新 currentNote
            if (currentNote && currentNote.filePath === note.filePath) {
              currentNote.filePath = result.filePath;
              currentNote.fileName = result.fileName;
              currentNote.displayName = newTitle;
              if (editorTitleInput) editorTitleInput.value = newTitle;
            }
            updateStatus();
          } else {
            input.replaceWith(titleEl);
          }
        };

        input.addEventListener('blur', confirmRename);
        input.addEventListener('keydown', (ke) => {
          if (ke.key === 'Enter') {
            input.blur(); // 触发 blur → confirmRename
          } else if (ke.key === 'Escape') {
            input.value = oldTitle;
            input.blur();
          }
        });
      }

      // ---- 事件绑定 ----
      document.getElementById('btn-sidebar-new').addEventListener('click', createNewNote);
      document.getElementById('btn-new').addEventListener('click', createNewNote);
      document.getElementById('btn-save').addEventListener('click', () => manualSave());

      // ---- 侧边栏视图切换 ----
      document.getElementById('tab-workspace').addEventListener('click', () => switchView('workspace'));
      document.getElementById('tab-trash').addEventListener('click', () => switchView('trash'));

      function switchView(view) {
        activeView = view;
        document.getElementById('tab-workspace').classList.toggle('active', view === 'workspace');
        document.getElementById('tab-trash').classList.toggle('active', view === 'trash');
        document.getElementById('sidebar-header-workspace').style.display = view === 'workspace' ? '' : 'none';
        document.getElementById('sort-controls').style.display = view === 'workspace' ? '' : 'none';
        document.getElementById('trash-actions').style.display = view === 'trash' ? '' : 'none';
        // 切换到回收站时，隐藏编辑区
        if (view === 'trash' && currentNote) {
          closeCurrentNote();
        }
        if (view === 'workspace') {
          loadNoteList();
        } else {
          loadTrashList();
        }
      }

      // ---- 排序控件 ----
      const sortBySelect = document.getElementById('sort-by');
      const sortAscBtn = document.getElementById('sort-asc');
      const sortDescBtn = document.getElementById('sort-desc');

      sortBySelect.addEventListener('change', () => {
        sortBy = sortBySelect.value;
        loadNoteList();
      });

      sortAscBtn.addEventListener('click', () => {
        sortDir = 'asc';
        sortAscBtn.classList.add('active');
        sortDescBtn.classList.remove('active');
        loadNoteList();
      });

      sortDescBtn.addEventListener('click', () => {
        sortDir = 'desc';
        sortDescBtn.classList.add('active');
        sortAscBtn.classList.remove('active');
        loadNoteList();
      });

      // ---- 回收站操作 ----
      document.getElementById('btn-empty-trash').addEventListener('click', async () => {
        await window.electronAPI.emptyTrash();
        statusLeft.textContent = '回收站已清空';
        await loadTrashList();
      });

      // 回收站右键菜单
      function showTrashContextMenu(e, trashNote) {
        contextNote = trashNote;
        contextMenuTrash.style.left = e.clientX + 'px';
        contextMenuTrash.style.top = e.clientY + 'px';
        contextMenuTrash.classList.add('visible');
      }

      async function handleRestoreFromTrash() {
        if (!contextNote) return;
        const note = contextNote;
        const result = await window.electronAPI.restoreFromTrash(note.fileName);
        if (result) {
          statusLeft.textContent = `已恢复: ${note.displayName}`;
          await loadTrashList();
          await loadNoteList();
        }
        contextMenuTrash.classList.remove('visible');
      }

      async function handlePermanentDelete() {
        if (!contextNote) return;
        const note = contextNote;
        const nameNumber = parseDefaultNameNumber(note.displayName);
        const ok = await window.electronAPI.permanentlyDelete(note.fileName);
        if (ok) {
          if (nameNumber !== null) {
            await window.electronAPI.releaseNameNumber(nameNumber);
          }
          statusLeft.textContent = `已永久删除: ${note.displayName}`;
          await loadTrashList();
        }
        contextMenuTrash.classList.remove('visible');
      }

      contextMenuTrash.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
          const action = item.dataset.action;
          if (action === 'restore') handleRestoreFromTrash();
          else if (action === 'delete-permanent') handlePermanentDelete();
        });
      });

      document.getElementById('btn-open').addEventListener('click', async () => {
        await saveCurrentNote();
        await handleImportNote();
      });

      // 侧边栏空白区域右键菜单
      noteListEl.addEventListener('contextmenu', (e) => {
        // 仅在点击空白区域（而非 .note-item）时显示空白区域菜单
        if (!e.target.closest('.note-item')) {
          showEmptyContextMenu(e);
        }
      });

      // 导入文件处理
      importFileInput.addEventListener('change', async () => {
        const file = importFileInput.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const defaultName = await window.electronAPI.getNextDefaultName();
          const title = file.name.replace(/\.(txt|md|markdown)$/i, '') || defaultName.title;
          const result = await window.electronAPI.createNote(title);
          await window.electronAPI.saveNote(result.filePath, text);
          await saveCurrentNote();
          currentNote = { filePath: result.filePath, fileName: result.fileName, displayName: title, mtime: Date.now() };
          currentContent = text;
          lastSavedContent = text;
          showEditor();
          if (editorTitleInput) editorTitleInput.value = title;
          // 将导入的纯文本转换为 HTML（换行 → <br>）
          editorDiv.innerHTML = text.split('\n').map(line =>
            line ? escapeHtml(line) : '<br>'
          ).join('<br>');
          await loadNoteList();
          renderNoteList();
          updateStatus();
          statusLeft.textContent = `已导入: ${title}`;
        } catch (err) {
          statusLeft.textContent = '导入失败: ' + err.message;
        }
      });

      // 右键菜单项点击
      contextMenu.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
          const action = item.dataset.action;
          if (action === 'rename') startRename();
          else if (action === 'duplicate') handleDuplicate();
          else if (action === 'cut') handleCut();
          else if (action === 'delete') handleDelete();
        });
      });

      // 空白区域右键菜单项点击
      contextMenuEmpty.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
          const action = item.dataset.action;
          if (action === 'new-note') {
            hideEmptyContextMenu();
            createNewNote();
          } else if (action === 'import-note') {
            handleImportNote();
          }
        });
      });

      // 点击菜单外部关闭
      document.addEventListener('click', (e) => {
        if (!contextMenu.contains(e.target)) {
          hideContextMenu();
        }
        if (!contextMenuEmpty.contains(e.target)) {
          hideEmptyContextMenu();
        }
        if (!contextMenuTrash.contains(e.target)) {
          contextMenuTrash.classList.remove('visible');
        }
      });

      // 全局快捷键
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          hideContextMenu();
          hideEmptyContextMenu();
          contextMenuTrash.classList.remove('visible');
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
          e.preventDefault();
          createNewNote();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          manualSave();
        }
      });

      // 防御：点击编辑区任意位置自动聚焦到 textarea
      editorArea.addEventListener('click', (e) => {
        if (editorDiv && !e.target.closest('.btn-close-note')) {
          editorDiv.focus();
        }
      });

      // ---- 撤销/重做按钮 ----
      btnUndo.addEventListener('click', () => {
        if (editorDiv) {
          editorDiv.focus();
          document.execCommand('undo');
        }
      });
      btnRedo.addEventListener('click', () => {
        if (editorDiv) {
          editorDiv.focus();
          document.execCommand('redo');
        }
      });

      // ---- 工具栏标签切换 ----
      document.querySelectorAll('.toolbar-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.toolbar-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const target = tab.dataset.tab;
          document.getElementById('toolbar-file').style.display = target === 'file' ? '' : 'none';
          document.getElementById('toolbar-style').style.display = target === 'style' ? '' : 'none';
          document.getElementById('toolbar-insert').style.display = target === 'insert' ? '' : 'none';
        });
      });

      // ---- 样式按钮事件绑定 ----
      /**
       * 确保编辑器获得焦点后执行命令
       * @param {string} command - execCommand 命令名
       * @param {string} [value] - 可选参数值
       */
      function execStyleCommand(command, value) {
        if (editorDiv) {
          editorDiv.focus();
          document.execCommand(command, false, value);
          updateStyleToolbar();
        }
      }

      /**
       * 将 rgb(r,g,b) 颜色转为 hex #rrggbb
       * @param {string} rgb - RGB 格式颜色字符串
       * @returns {string|null} hex 颜色或 null
       */
      function rgbToHex(rgb) {
        if (!rgb || rgb === 'transparent' || rgb === 'rgba(0,0,0,0)') return null;
        const m = rgb.match(/\d+/g);
        if (!m) return null;
        return '#' + m.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
      }

      /**
       * 检测当前段落对齐方式并更新按钮 active 态
       */
      function updateAlignButtons() {
        if (!editorDiv) return;
        const sel = window.getSelection();
        if (!sel.rangeCount) return;
        let node = sel.anchorNode;
        while (node && node !== editorDiv) {
          if (node.nodeType === 1) {
            const ta = window.getComputedStyle(node).textAlign;
            if (ta && ta !== 'start' && ta !== 'justify') {
              btnAlignLeft.classList.toggle('active', ta === 'left');
              btnAlignCenter.classList.toggle('active', ta === 'center');
              btnAlignRight.classList.toggle('active', ta === 'right');
              return;
            }
          }
          node = node.parentNode;
        }
        // 默认左对齐
        btnAlignLeft.classList.toggle('active', true);
        btnAlignCenter.classList.toggle('active', false);
        btnAlignRight.classList.toggle('active', false);
      }

      /**
       * 根据当前选区/光标位置更新样式工具栏所有按钮状态
       */
      function updateStyleToolbar() {
        if (!editorDiv) return;
        const hasFocus = document.activeElement === editorDiv || editorDiv.contains(document.activeElement);
        if (!hasFocus && !formatPainterActive) return;

        // Toggle 按钮
        btnBold.classList.toggle('active', document.queryCommandState('bold'));
        btnItalic.classList.toggle('active', document.queryCommandState('italic'));
        btnUnderline.classList.toggle('active', document.queryCommandState('underline'));

        // 字体下拉同步
        const font = document.queryCommandValue('fontName');
        btnFontFamily.value = font || '';

        // 字号下拉同步
        const size = document.queryCommandValue('fontSize');
        btnFontSize.value = size || '';

        // 颜色色块同步
        const fore = rgbToHex(document.queryCommandValue('foreColor'));
        if (fore) {
          btnForecolor.value = fore;
          swatchForecolor.style.background = fore;
        }
        const hilite = rgbToHex(document.queryCommandValue('hiliteColor'));
        if (hilite) {
          btnHilitecolor.value = hilite;
          swatchHilitecolor.style.background = hilite;
        } else {
          swatchHilitecolor.style.background = '#ff0';
          btnHilitecolor.value = '#ffff00';
        }

        // 对齐按钮
        updateAlignButtons();
      }

      // 加粗
      btnBold.addEventListener('click', () => { execStyleCommand('bold'); });

      // 倾斜
      btnItalic.addEventListener('click', () => { execStyleCommand('italic'); });

      // 下划线
      btnUnderline.addEventListener('click', () => { execStyleCommand('underline'); });

      // 字体选择
      btnFontFamily.addEventListener('change', (e) => {
        if (e.target.value) {
          execStyleCommand('fontName', e.target.value);
        }
      });

      // 字号选择
      btnFontSize.addEventListener('change', (e) => {
        if (e.target.value) {
          execStyleCommand('fontSize', e.target.value);
        }
      });

      // 左对齐
      btnAlignLeft.addEventListener('click', () => { execStyleCommand('justifyLeft'); });

      // 居中对齐
      btnAlignCenter.addEventListener('click', () => { execStyleCommand('justifyCenter'); });

      // 右对齐
      btnAlignRight.addEventListener('click', () => { execStyleCommand('justifyRight'); });

      // 字体颜色
      btnForecolor.addEventListener('input', (e) => {
        if (editorDiv) {
          editorDiv.focus();
          document.execCommand('foreColor', false, e.target.value);
          swatchForecolor.style.background = e.target.value;
        }
      });

      // 字体底色
      btnHilitecolor.addEventListener('input', (e) => {
        if (editorDiv) {
          editorDiv.focus();
          document.execCommand('hiliteColor', false, e.target.value);
          swatchHilitecolor.style.background = e.target.value;
        }
      });

      // ---- 格式刷 ----
      function activateFormatPainter() {
        if (!editorDiv) return;
        editorDiv.focus();
        savedFormat = {
          bold: document.queryCommandState('bold'),
          italic: document.queryCommandState('italic'),
          underline: document.queryCommandState('underline'),
          fontName: document.queryCommandValue('fontName'),
          fontSize: document.queryCommandValue('fontSize'),
          foreColor: document.queryCommandValue('foreColor'),
          hiliteColor: document.queryCommandValue('hiliteColor'),
        };
        formatPainterActive = true;
        btnFormatPainter.classList.add('active');
        editorDiv.style.cursor = 'copy';
      }

      function applyFormatPainter() {
        if (!formatPainterActive || !savedFormat) return;
        if (savedFormat.bold) document.execCommand('bold');
        if (savedFormat.italic) document.execCommand('italic');
        if (savedFormat.underline) document.execCommand('underline');
        if (savedFormat.fontName) document.execCommand('fontName', false, savedFormat.fontName);
        if (savedFormat.fontSize) document.execCommand('fontSize', false, savedFormat.fontSize);
        if (savedFormat.foreColor && savedFormat.foreColor !== 'rgb(0, 0, 0)' && savedFormat.foreColor !== 'rgb(0,0,0)') {
          document.execCommand('foreColor', false, savedFormat.foreColor);
        }
        if (savedFormat.hiliteColor && savedFormat.hiliteColor !== 'transparent' && savedFormat.hiliteColor !== 'rgb(255, 255, 255)' && savedFormat.hiliteColor !== 'rgb(255,255,255)') {
          document.execCommand('hiliteColor', false, savedFormat.hiliteColor);
        }
        deactivateFormatPainter();
        updateStyleToolbar();
      }

      function deactivateFormatPainter() {
        formatPainterActive = false;
        savedFormat = null;
        btnFormatPainter.classList.remove('active');
        if (editorDiv) editorDiv.style.cursor = '';
      }

      btnFormatPainter.addEventListener('click', () => {
        if (formatPainterActive) {
          deactivateFormatPainter();
        } else {
          activateFormatPainter();
        }
      });

      // 编辑器内 mouseup 时，若格式刷激活则应用格式
      editorArea.addEventListener('mouseup', (e) => {
        if (formatPainterActive && editorDiv && editorDiv.contains(e.target)) {
          // 延迟执行，确保选区已更新
          setTimeout(() => {
            if (formatPainterActive) applyFormatPainter();
          }, 50);
        }
      });

      // ---- 插入功能 ----
      document.getElementById('btn-checklist').addEventListener('click', () => {
        if (!editorDiv) return;
        editorDiv.focus();
        const cb = document.createElement('span');
        cb.className = 'check-box';
        cb.contentEditable = 'false';
        cb.textContent = '☐';
        cb.title = '点击切换完成状态';
        // 插入复选框 + 空格，光标移到后面
        const sel = window.getSelection();
        if (sel.rangeCount) {
          const range = sel.getRangeAt(0);
          range.deleteContents();
          range.insertNode(cb);
          // 在复选框后插入空格并将光标移到空格后
          range.setStartAfter(cb);
          range.collapse(true);
          const space = document.createTextNode(' ');
          range.insertNode(space);
          range.setStartAfter(space);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
        }
      });

      document.getElementById('btn-timestamp').addEventListener('click', () => {
        if (!editorDiv) return;
        editorDiv.focus();
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        const ts = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
        document.execCommand('insertText', false, ts + ' ');
      });

      // 委托：点击复选框切换完成状态
      editorArea.addEventListener('click', (e) => {
        const cb = e.target.closest('.check-box');
        if (!cb || !editorDiv) return;
        e.stopPropagation();
        const isChecked = cb.classList.toggle('checked');
        cb.textContent = isChecked ? '☑' : '☐';
        // 找到复选框所在的块级父元素，切换删除线样式
        let block = cb.parentElement;
        while (block && block !== editorDiv) {
          const tag = block.tagName ? block.tagName.toLowerCase() : '';
          if (tag === 'div' || tag === 'p' || tag === 'li' || block === editorArea) break;
          block = block.parentElement;
        }
        if (block && block !== editorArea) {
          block.classList.toggle('checklist-checked', isChecked);
        }
      });

      // 选区变化时更新工具栏
      document.addEventListener('selectionchange', () => {
        if (!formatPainterActive) updateStyleToolbar();
      });
      if (editorDiv) {
        editorDiv.addEventListener('click', updateStyleToolbar);
        editorDiv.addEventListener('keyup', updateStyleToolbar);
      }
      // 编辑器创建后绑定事件（在 showEditor 中追加）
      const origShowEditor = showEditor;
      showEditor = function () {
        origShowEditor();
        if (editorDiv) {
          editorDiv.addEventListener('click', updateStyleToolbar);
          editorDiv.addEventListener('keyup', updateStyleToolbar);
        }
      };

      // ---- 启动 ----
      loadNoteList();
    })();
  </script>
</body>
</html>
