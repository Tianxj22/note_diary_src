<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>Note Diary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 1fr;
      height: 100vh;
      color: #333;
      background: #f5f5f5;
    }

    /* ===== 侧边栏 ===== */
    .sidebar {
      background: #2c2c2c;
      color: #ccc;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1a1a1a;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #3a3a3a;
    }

    .sidebar-header h2 {
      font-size: 1rem;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .btn-new-note {
      width: 100%;
      padding: 8px 0;
      border: 1px solid #4a4a4a;
      border-radius: 6px;
      background: #3a3a3a;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s;
    }

    .btn-new-note:hover {
      background: #4a4a4a;
    }

    .note-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .note-list .empty {
      text-align: center;
      color: #666;
      margin-top: 40px;
      font-size: 0.85rem;
    }

    .note-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }

    .note-item:hover {
      background: #333;
    }

    .note-item.active {
      background: #3a3a3a;
      border-left-color: #6c9fff;
      color: #fff;
    }

    .note-item .title {
      font-size: 0.9rem;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item .meta {
      font-size: 0.7rem;
      color: #777;
    }

    .note-item.active .meta {
      color: #999;
    }

    /* ===== 主区域 ===== */
    .main-area {
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    /* 工具栏 */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
    }

    .toolbar button {
      padding: 6px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.82rem;
      color: #444;
      transition: background 0.1s, border-color 0.1s;
    }

    .toolbar button:hover {
      background: #eee;
      border-color: #bbb;
    }

    .toolbar button:active {
      background: #ddd;
    }

    .toolbar button:disabled {
      opacity: 0.4;
      cursor: default;
      background: #f5f5f5;
    }

    .toolbar .separator {
      width: 1px;
      height: 22px;
      background: #d0d0d0;
      margin: 0 4px;
    }

    .toolbar .note-title-input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #333;
      outline: none;
      transition: border-color 0.15s;
    }

    .toolbar .note-title-input:focus {
      border-color: #6c9fff;
    }

    /* 编辑区 */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .editor-area .no-note {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #bbb;
      font-size: 1.1rem;
      user-select: none;
    }

    .editor-area textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      padding: 20px 24px;
      font-size: 0.95rem;
      line-height: 1.8;
      font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
      color: #333;
    }

    .editor-area textarea::placeholder {
      color: #ccc;
    }

    /* 关闭当前笔记按钮 */
    .btn-close-note {
      position: absolute;
      top: 8px;
      right: 12px;
      z-index: 10;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: #999;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .btn-close-note:hover {
      background: #e0e0e0;
      color: #555;
    }

    /* ===== 右键上下文菜单 ===== */
    .context-menu {
      display: none;
      position: fixed;
      z-index: 9999;
      background: #333;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px 0;
      min-width: 150px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .context-menu.visible {
      display: block;
    }

    .context-menu .menu-item {
      padding: 8px 16px;
      cursor: pointer;
      color: #ddd;
      font-size: 0.85rem;
      transition: background 0.1s;
    }

    .context-menu .menu-item:hover {
      background: #4a4a4a;
      color: #fff;
    }

    .context-menu .menu-item.danger {
      color: #f66;
    }

    .context-menu .menu-item.danger:hover {
      background: #a33;
      color: #fff;
    }

    .context-menu .menu-divider {
      height: 1px;
      background: #555;
      margin: 4px 8px;
    }

    /* ===== 侧边栏内联重命名 ===== */
    .note-item .rename-input {
      width: calc(100% - 8px);
      padding: 2px 4px;
      border: 1px solid #6c9fff;
      border-radius: 3px;
      background: #444;
      color: #fff;
      font-size: 0.88rem;
      outline: none;
    }

    /* 状态栏 */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 4px 12px;
      border-top: 1px solid #e8e8e8;
      background: #fafafa;
      font-size: 0.72rem;
      color: #999;
    }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>NOTE DIARY</h2>
      <button class="btn-new-note" id="btn-sidebar-new">+ 新建笔记</button>
    </div>
    <div class="note-list" id="note-list">
      <div class="empty">暂无笔记<br>点击上方按钮创建</div>
    </div>
  </aside>

  <!-- 主区域 -->
  <div class="main-area">
    <div class="toolbar">
      <button id="btn-new" title="新建笔记 (Ctrl+N)">新建</button>
      <button id="btn-open" title="导入外部文件">导入</button>
      <span class="separator"></span>
      <button id="btn-undo" title="撤销 (Ctrl+Z)" disabled>↩ 撤销</button>
      <button id="btn-redo" title="重做 (Ctrl+Y)" disabled>↪ 重做</button>
      <span class="separator"></span>
      <button id="btn-save" title="保存笔记 (Ctrl+S)">💾 保存</button>
      <span class="separator"></span>
      <input type="text" class="note-title-input" id="note-title" placeholder="笔记标题..." />
    </div>

    <div class="editor-area" id="editor-area">
      <div class="no-note">选择或新建一篇笔记开始编辑</div>
    </div>

    <div class="status-bar">
      <span id="status-left">就绪</span>
      <span id="status-right"></span>
    </div>
  </div>

  <!-- 右键上下文菜单（笔记项） -->
  <div class="context-menu" id="context-menu">
    <div class="menu-item" data-action="rename">✏️ 重命名</div>
    <div class="menu-item" data-action="duplicate">📋 复制</div>
    <div class="menu-item" data-action="cut">✂️ 剪切</div>
    <div class="menu-divider"></div>
    <div class="menu-item danger" data-action="delete">🗑️ 删除</div>
  </div>

  <!-- 右键上下文菜单（侧边栏空白区域） -->
  <div class="context-menu" id="context-menu-empty">
    <div class="menu-item" data-action="new-note">📝 新建笔记</div>
    <div class="menu-item" data-action="import-note">📥 导入笔记</div>
  </div>

  <!-- 隐藏的文件选择器用于导入 -->
  <input type="file" id="import-file-input" accept=".txt,.md,.markdown" style="display:none">

  <script>
    (function () {
      // ---- 状态 ----
      let notes = [];
      let currentNote = null;        // { fileName, filePath, displayName, mtime }
      let currentContent = '';
      let undoStack = [];
      let redoStack = [];
      const MAX_UNDO = 50;
      let saveTimer = null;
      let lastSavedContent = '';

      // ---- DOM 引用 ----
      const noteListEl = document.getElementById('note-list');
      const editorArea = document.getElementById('editor-area');
      const titleInput = document.getElementById('note-title');
      const btnUndo = document.getElementById('btn-undo');
      const btnRedo = document.getElementById('btn-redo');
      const statusLeft = document.getElementById('status-left');

      let textarea = null;

      // ---- 右键菜单 DOM ----
      const contextMenu = document.getElementById('context-menu');
      const contextMenuEmpty = document.getElementById('context-menu-empty');
      const importFileInput = document.getElementById('import-file-input');
      let contextNote = null; // 当前右键操作的笔记对象

      // ---- 渲染笔记列表 ----
      function renderNoteList() {
        noteListEl.innerHTML = '';
        if (notes.length === 0) {
          noteListEl.innerHTML = '<div class="empty">暂无笔记<br>点击上方按钮创建</div>';
          return;
        }
        notes.forEach(n => {
          const div = document.createElement('div');
          div.className = 'note-item' + (currentNote && currentNote.filePath === n.filePath ? ' active' : '');
          div.innerHTML = `<div class="title">${escapeHtml(n.displayName)}</div>
                           <div class="meta">${formatDate(n.mtime)}</div>`;
          div.addEventListener('click', () => selectNote(n));
          div.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showContextMenu(e, n);
          });
          noteListEl.appendChild(div);
        });
      }

      // ---- 加载笔记列表 ----
      async function loadNoteList() {
        notes = await window.electronAPI.listNotes();
        renderNoteList();
      }

      // ---- 选择笔记 ----
      async function selectNote(note) {
        if (currentNote && currentNote.filePath === note.filePath) return;
        // 在 async gap 前清空 currentNote，防止 autoSave 写入错误的笔记
        const prevNote = currentNote;
        currentNote = null;
        if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
        // 保存上一个笔记（此时 textarea 仍有效）
        if (prevNote && textarea) {
          const content = textarea.value;
          if (content !== lastSavedContent) {
            await window.electronAPI.saveNote(prevNote.filePath, content);
          }
        }
        currentNote = note;
        currentContent = await window.electronAPI.readNote(note.filePath);
        lastSavedContent = currentContent;
        undoStack = [];
        redoStack = [];
        updateUndoRedoButtons();
        showEditor();
        titleInput.value = note.displayName;
        textarea.value = currentContent;
        textarea.focus();
        renderNoteList();
        updateStatus();
      }

      // ---- 新建笔记 ----
      async function createNewNote() {
        await saveCurrentNote();
        const defaultName = await window.electronAPI.getNextDefaultName();
        const title = defaultName.title;
        const result = await window.electronAPI.createNote(title);
        currentNote = { filePath: result.filePath, fileName: result.fileName, displayName: title, mtime: Date.now() };
        currentContent = '';
        lastSavedContent = '';
        undoStack = [];
        redoStack = [];
        updateUndoRedoButtons();
        showEditor();
        titleInput.value = title;
        textarea.value = '';
        textarea.focus();
        await loadNoteList();
        renderNoteList();
        updateStatus();
      }

      // ---- 保存当前笔记 ----
      async function saveCurrentNote() {
        if (!currentNote || !textarea) return;
        const content = textarea.value;
        if (content === lastSavedContent) return;
        const ok = await window.electronAPI.saveNote(currentNote.filePath, content);
        if (ok) {
          lastSavedContent = content;
          currentNote.mtime = Date.now();
          statusLeft.textContent = '已保存';
          setTimeout(() => { if (statusLeft.textContent === '已保存') updateStatus(); }, 1500);
        }
      }

      // ---- 自动保存（防抖）—— 已禁用 ----
      // function autoSave() {
      //   if (saveTimer) clearTimeout(saveTimer);
      //   saveTimer = setTimeout(async () => {
      //     if (textarea && textarea.value !== lastSavedContent) {
      //       pushUndo(lastSavedContent);
      //     }
      //     await saveCurrentNote();
      //     await loadNoteList();
      //     renderNoteList();
      //   }, 500);
      // }

      // ---- 手动保存 ----
      async function manualSave() {
        if (!currentNote || !textarea) return;
        const content = textarea.value;
        if (content === lastSavedContent) return;
        pushUndo(lastSavedContent);
        const ok = await window.electronAPI.saveNote(currentNote.filePath, content);
        if (ok) {
          lastSavedContent = content;
          currentNote.mtime = Date.now();
          statusLeft.textContent = '已保存';
          setTimeout(() => { if (statusLeft.textContent === '已保存') updateStatus(); }, 1500);
          await loadNoteList();
          renderNoteList();
        }
      }

      // ---- 关闭当前笔记 ----
      async function closeCurrentNote() {
        if (!currentNote) return;
        // 先保存当前内容
        if (textarea) {
          const content = textarea.value;
          if (content !== lastSavedContent) {
            await window.electronAPI.saveNote(currentNote.filePath, content);
          }
        }
        if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
        currentNote = null;
        currentContent = '';
        lastSavedContent = '';
        undoStack = [];
        redoStack = [];
        updateUndoRedoButtons();
        hideEditor();
        titleInput.value = '';
        updateStatus();
      }

      // ---- 编辑器显示/隐藏 ----
      function showEditor() {
        editorArea.innerHTML = '';
        const closeBtn = document.createElement('button');
        closeBtn.className = 'btn-close-note';
        closeBtn.textContent = '×';
        closeBtn.title = '关闭当前笔记';
        closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeCurrentNote(); });
        editorArea.appendChild(closeBtn);
        textarea = document.createElement('textarea');
        textarea.placeholder = '在这里开始记录...';
        textarea.addEventListener('input', onEditorInput);
        textarea.addEventListener('keydown', onEditorKeydown);
        editorArea.appendChild(textarea);
      }

      function hideEditor() {
        editorArea.innerHTML = '<div class="no-note">选择或新建一篇笔记开始编辑</div>';
        textarea = null;
      }

      // ---- 编辑事件 ----
      function onEditorInput() {
        // autoSave();  // 已禁用自动保存，改用 Ctrl+S / 保存按钮
      }

      function onEditorKeydown(e) {
        if (e.ctrlKey && e.key === 'z') {
          e.preventDefault();
          undo();
        } else if (e.ctrlKey && e.key === 'y') {
          e.preventDefault();
          redo();
        } else if (e.ctrlKey && e.key === 'n') {
          e.preventDefault();
          createNewNote();
        } else if (e.ctrlKey && e.key === 's') {
          e.preventDefault();
          manualSave();
        }
      }

      // ---- 撤销/重做 ----
      function pushUndo(content) {
        if (undoStack.length >= MAX_UNDO) {
          undoStack.shift();
        }
        undoStack.push(content);
        redoStack = [];
        updateUndoRedoButtons();
      }

      function undo() {
        if (undoStack.length === 0) return;
        redoStack.push(textarea.value);
        const prev = undoStack.pop();
        textarea.value = prev;
        lastSavedContent = prev;
        updateUndoRedoButtons();
      }

      function redo() {
        if (redoStack.length === 0) return;
        undoStack.push(textarea.value);
        const next = redoStack.pop();
        textarea.value = next;
        lastSavedContent = next;
        updateUndoRedoButtons();
      }

      function updateUndoRedoButtons() {
        btnUndo.disabled = undoStack.length === 0;
        btnRedo.disabled = redoStack.length === 0;
      }

      // ---- 状态栏 ----
      function updateStatus() {
        if (currentNote) {
          statusLeft.textContent = `当前: ${currentNote.displayName}`;
        } else {
          statusLeft.textContent = '就绪';
        }
      }

      // ---- 工具函数 ----
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function formatDate(ts) {
        const d = new Date(ts);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }

      /**
       * 解析"新建笔记本*"格式的笔记名称，提取序号
       * @param {string} displayName - 笔记显示名称
       * @returns {number|null} 序号（"新建笔记本"返回1，"新建笔记本 (2)"返回2），不匹配返回 null
       */
      function parseDefaultNameNumber(displayName) {
        if (displayName === '新建笔记本') return 1;
        const match = displayName.match(/^新建笔记本 \((\d+)\)$/);
        return match ? parseInt(match[1], 10) : null;
      }

      // ---- 右键菜单 ----
      /**
       * 显示右键上下文菜单
       * @param {MouseEvent} e - 鼠标事件
       * @param {object} note - 笔记对象
       */
      function showContextMenu(e, note) {
        contextNote = note;
        contextMenu.style.left = e.clientX + 'px';
        contextMenu.style.top = e.clientY + 'px';
        contextMenu.classList.add('visible');
      }

      /**
       * 隐藏右键上下文菜单
       */
      function hideContextMenu() {
        contextMenu.classList.remove('visible');
        contextNote = null;
      }

      /**
       * 显示侧边栏空白区域右键菜单
       * @param {MouseEvent} e - 鼠标事件
       */
      function showEmptyContextMenu(e) {
        e.preventDefault();
        contextMenuEmpty.style.left = e.clientX + 'px';
        contextMenuEmpty.style.top = e.clientY + 'px';
        contextMenuEmpty.classList.add('visible');
      }

      /**
       * 隐藏侧边栏空白区域右键菜单
       */
      function hideEmptyContextMenu() {
        contextMenuEmpty.classList.remove('visible');
      }

      /**
       * 导入外部文本文件作为新笔记
       */
      async function handleImportNote() {
        hideEmptyContextMenu();
        importFileInput.value = '';
        importFileInput.click();
      }

      // ---- 笔记操作 ----
      /**
       * 删除当前右键选中的笔记
       */
      async function handleDelete() {
        if (!contextNote) return;
        const name = contextNote.displayName;
        if (!confirm(`确定要删除笔记"${name}"吗？此操作不可撤销。`)) return;

        // 如果删除的是当前笔记，先关闭（保存内容 + 清空状态），避免编辑框残留指向已删除文件
        const isCurrentNote = currentNote && currentNote.filePath === contextNote.filePath;
        if (isCurrentNote) {
          await closeCurrentNote();
        }

        const nameNumber = parseDefaultNameNumber(name);
        const ok = await window.electronAPI.deleteNote(contextNote.filePath);
        if (ok) {
          if (nameNumber !== null) {
            await window.electronAPI.releaseNameNumber(nameNumber);
          }
          statusLeft.textContent = `已删除: ${name}`;
          await loadNoteList();
          renderNoteList();
          // 删除的是当前笔记：有剩余笔记则打开第一篇，否则新建空白笔记
          if (isCurrentNote) {
            if (notes.length > 0) {
              await selectNote(notes[0]);
            } else {
              await createNewNote();
            }
          }
          updateStatus();
        }
        hideContextMenu();
      }

      /**
       * 复制（创建副本）当前右键选中的笔记
       */
      async function handleDuplicate() {
        if (!contextNote) return;
        const result = await window.electronAPI.duplicateNote(contextNote.filePath);
        if (result) {
          statusLeft.textContent = `已复制: ${contextNote.displayName}`;
          await loadNoteList();
          renderNoteList();
        }
        hideContextMenu();
      }

      /**
       * 剪切当前右键选中的笔记（移至剪贴板目录）
       */
      async function handleCut() {
        if (!contextNote) return;

        // 如果剪切的是当前笔记，先关闭再移动文件
        const isCurrentNote = currentNote && currentNote.filePath === contextNote.filePath;
        if (isCurrentNote) {
          await closeCurrentNote();
        }

        const result = await window.electronAPI.cutNote(contextNote.filePath);
        if (result) {
          statusLeft.textContent = `已剪切: ${contextNote.displayName}`;
          await loadNoteList();
          renderNoteList();
          if (isCurrentNote) {
            if (notes.length > 0) {
              await selectNote(notes[0]);
            } else {
              await createNewNote();
            }
          }
          updateStatus();
        }
        hideContextMenu();
      }

      /**
       * 开始内联重命名侧边栏中的笔记项
       * @param {object} note - 笔记对象
       */
      async function startRename() {
        if (!contextNote) return;
        const note = contextNote;
        hideContextMenu();

        // 在侧边栏中找到对应 DOM 元素
        const items = noteListEl.querySelectorAll('.note-item');
        let targetItem = null;
        items.forEach(item => {
          const titleEl = item.querySelector('.title');
          if (titleEl && titleEl.textContent === note.displayName) {
            targetItem = item;
          }
        });
        if (!targetItem) return;

        const titleEl = targetItem.querySelector('.title');
        const oldTitle = note.displayName;

        // 替换为 input
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'rename-input';
        input.value = oldTitle;
        titleEl.replaceWith(input);
        input.focus();
        input.select();

        /**
         * 确认重命名
         */
        const confirmRename = async () => {
          const newTitle = input.value.trim();
          if (!newTitle || newTitle === oldTitle) {
            // 取消：还原 title
            input.replaceWith(titleEl);
            return;
          }
          const result = await window.electronAPI.renameNote(note.filePath, newTitle);
          if (result) {
            statusLeft.textContent = `已重命名: ${oldTitle} → ${newTitle}`;
            await loadNoteList();
            // 如果重命名的是当前打开的笔记，更新 currentNote
            if (currentNote && currentNote.filePath === note.filePath) {
              currentNote.filePath = result.filePath;
              currentNote.fileName = result.fileName;
              currentNote.displayName = newTitle;
              titleInput.value = newTitle;
            }
            updateStatus();
          } else {
            input.replaceWith(titleEl);
          }
        };

        input.addEventListener('blur', confirmRename);
        input.addEventListener('keydown', (ke) => {
          if (ke.key === 'Enter') {
            input.blur(); // 触发 blur → confirmRename
          } else if (ke.key === 'Escape') {
            input.value = oldTitle;
            input.blur();
          }
        });
      }

      // ---- 事件绑定 ----
      document.getElementById('btn-sidebar-new').addEventListener('click', createNewNote);
      document.getElementById('btn-new').addEventListener('click', createNewNote);
      document.getElementById('btn-undo').addEventListener('click', undo);
      document.getElementById('btn-redo').addEventListener('click', redo);
      document.getElementById('btn-save').addEventListener('click', () => manualSave());

      document.getElementById('btn-open').addEventListener('click', async () => {
        await saveCurrentNote();
        await handleImportNote();
      });

      // 侧边栏空白区域右键菜单
      noteListEl.addEventListener('contextmenu', (e) => {
        // 仅在点击空白区域（而非 .note-item）时显示空白区域菜单
        if (!e.target.closest('.note-item')) {
          showEmptyContextMenu(e);
        }
      });

      // 导入文件处理
      importFileInput.addEventListener('change', async () => {
        const file = importFileInput.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const defaultName = await window.electronAPI.getNextDefaultName();
          const title = file.name.replace(/\.(txt|md|markdown)$/i, '') || defaultName.title;
          const result = await window.electronAPI.createNote(title);
          await window.electronAPI.saveNote(result.filePath, text);
          await saveCurrentNote();
          currentNote = { filePath: result.filePath, fileName: result.fileName, displayName: title, mtime: Date.now() };
          currentContent = text;
          lastSavedContent = text;
          undoStack = [];
          redoStack = [];
          updateUndoRedoButtons();
          showEditor();
          titleInput.value = title;
          textarea.value = text;
          await loadNoteList();
          renderNoteList();
          updateStatus();
          statusLeft.textContent = `已导入: ${title}`;
        } catch (err) {
          statusLeft.textContent = '导入失败: ' + err.message;
        }
      });

      // 右键菜单项点击
      contextMenu.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
          const action = item.dataset.action;
          if (action === 'rename') startRename();
          else if (action === 'duplicate') handleDuplicate();
          else if (action === 'cut') handleCut();
          else if (action === 'delete') handleDelete();
        });
      });

      // 空白区域右键菜单项点击
      contextMenuEmpty.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
          const action = item.dataset.action;
          if (action === 'new-note') {
            hideEmptyContextMenu();
            createNewNote();
          } else if (action === 'import-note') {
            handleImportNote();
          }
        });
      });

      // 点击菜单外部关闭
      document.addEventListener('click', (e) => {
        if (!contextMenu.contains(e.target)) {
          hideContextMenu();
        }
        if (!contextMenuEmpty.contains(e.target)) {
          hideEmptyContextMenu();
        }
      });

      titleInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (currentNote) {
            const newTitle = titleInput.value.trim();
            if (newTitle && newTitle !== currentNote.displayName) {
              const result = await window.electronAPI.renameNote(currentNote.filePath, newTitle);
              if (result) {
                currentNote.filePath = result.filePath;
                currentNote.fileName = result.fileName;
                currentNote.displayName = newTitle;
                await loadNoteList();
                updateStatus();
                statusLeft.textContent = '已重命名';
              }
            }
          }
          textarea && textarea.focus();
        }
      });

      // 全局快捷键
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          hideContextMenu();
          hideEmptyContextMenu();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
          e.preventDefault();
          createNewNote();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          manualSave();
        }
      });

      // 防御：点击编辑区任意位置自动聚焦到 textarea
      editorArea.addEventListener('click', (e) => {
        if (textarea && !e.target.closest('.btn-close-note')) {
          textarea.focus();
        }
      });

      // ---- 启动 ----
      loadNoteList();
    })();
  </script>
</body>
</html>
