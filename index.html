<!--
  @file         index.html
  @description  Note Diary 主界面 — 侧边栏笔记列表 + 工具栏 + 文本编辑区
  @author       tianxj22
  @created      2024-06-24
  @updated      2026-06-25
  @version      1.3.0
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <title>Note Diary</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/toolbar.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/image-resize.css">
  <link rel="stylesheet" href="css/overlays.css">
  <link rel="stylesheet" href="css/drawing.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="css/conflict.css">
  <link rel="stylesheet" href="css/edit-toolbar.css">
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-view="workspace" id="tab-workspace">📁 工作区</button>
      <button class="sidebar-tab" data-view="trash" id="tab-trash">🗑 回收站</button>
      <button class="sidebar-tab conflict-tab" data-view="conflicts" id="tab-conflicts">⚠ 冲突<span class="badge hidden">0</span></button>
    </div>
    <!-- 工作区页眉 -->
    <div class="sidebar-header" id="sidebar-header-workspace">
      <button class="btn-new-note" id="btn-sidebar-new" title="新建笔记 (Ctrl+N)">+ 新建笔记</button>
    </div>
    <!-- 排序控件 -->
    <div class="sort-controls" id="sort-controls">
      <select id="sort-by">
        <option value="mtime">修改时间</option>
        <option value="name">名称</option>
        <option value="created">创建时间</option>
      </select>
      <button class="sort-dir-btn" id="sort-asc" title="升序">↑</button>
      <button class="sort-dir-btn active" id="sort-desc" title="倒序">↓</button>
    </div>
    <!-- 回收站页眉 -->
    <div class="trash-actions" id="trash-actions" style="display:none">
      <button class="btn-empty-trash" id="btn-empty-trash">🗑 清空回收站</button>
    </div>
    <!-- 冲突批量操作栏 -->
    <div class="conflict-bulk-actions" id="conflict-bulk-actions">
      <button class="btn-bulk-local" id="btn-bulk-local">全部保留本地</button>
      <button class="btn-bulk-remote" id="btn-bulk-remote">全部保留远程</button>
    </div>
    <div class="note-list" id="note-list">
      <div class="empty">暂无笔记<br>点击上方按钮创建</div>
    </div>
  </aside>

  <!-- 主区域 -->
  <div class="main-area">
    <div class="toolbar">
      <div class="toolbar-tabs">
        <button class="toolbar-tab active" data-tab="file">📁 文件</button>
        <button class="toolbar-tab" data-tab="style">🎨 样式</button>
        <button class="toolbar-tab" data-tab="insert">📥 插入</button>
        <button class="toolbar-tab" data-tab="edit">✂️ 编辑</button>
        <button class="toolbar-tab" data-tab="draw">✏️ 绘图</button>
        <button class="toolbar-tab toolbar-tab-image" data-tab="image-edit" id="tab-image-edit" style="display:none">🖼 图片编辑</button>
        <button class="toolbar-tab" data-tab="sync">☁ 同步</button>
      </div>
      <div class="toolbar-actions" id="toolbar-file">
        <button id="btn-new" class="style-btn" data-tooltip="新建笔记 (Ctrl+N)">📝</button>
        <button id="btn-open" class="style-btn" data-tooltip="导入外部文件">📥</button>
        <span class="separator"></span>
        <button id="btn-undo" class="style-btn" data-tooltip="撤销 (Ctrl+Z)" disabled>↩</button>
        <button id="btn-redo" class="style-btn" data-tooltip="重做 (Ctrl+Y)" disabled>↪</button>
        <span class="separator"></span>
        <button id="btn-save" class="style-btn" data-tooltip="保存笔记 (Ctrl+S)">💾</button>
        <span class="separator"></span>
        <button id="btn-settings" class="style-btn" data-tooltip="设置 (云同步配置)">⚙</button>
      </div>
      <div class="toolbar-actions" id="toolbar-style" style="display:none">
        <button id="btn-bold" class="style-btn" data-tooltip="加粗 (Ctrl+B)"><b>B</b></button>
        <button id="btn-italic" class="style-btn" data-tooltip="倾斜 (Ctrl+I)"><i>I</i></button>
        <button id="btn-underline" class="style-btn" data-tooltip="下划线 (Ctrl+U)"><u>U</u></button>
        <span class="separator"></span>
        <select id="btn-font-family" title="字体选择">
          <option value="">字体</option>
          <option value="Microsoft YaHei">微软雅黑</option>
          <option value="SimSun">宋体</option>
          <option value="KaiTi">楷体</option>
          <option value="FangSong">仿宋</option>
          <option value="SimHei">黑体</option>
          <option value="Arial">Arial</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Courier New">Courier New</option>
          <option value="Georgia">Georgia</option>
          <option value="Verdana">Verdana</option>
        </select>
        <select id="btn-font-size" title="字号选择">
          <option value="">字号</option>
          <option value="1">12px</option>
          <option value="2">14px</option>
          <option value="3">16px</option>
          <option value="4">18px</option>
          <option value="5">20px</option>
          <option value="6">24px</option>
          <option value="7">30px</option>
          <option value="8">36px</option>
          <option value="9">48px</option>
        </select>
        <span class="separator"></span>
        <button id="btn-align-left" class="style-btn" data-tooltip="左对齐">
          <span class="align-bars align-left"><span></span><span></span><span></span></span>
        </button>
        <button id="btn-align-center" class="style-btn" data-tooltip="居中对齐">
          <span class="align-bars align-center"><span></span><span></span><span></span></span>
        </button>
        <button id="btn-align-right" class="style-btn" data-tooltip="右对齐">
          <span class="align-bars align-right"><span></span><span></span><span></span></span>
        </button>
        <span class="separator"></span>
        <span class="color-btn" title="字体颜色">
          A<span class="color-swatch" id="swatch-forecolor" style="background:#333"></span>
          <input type="color" id="btn-forecolor" value="#333333">
        </span>
        <span class="color-btn" title="字体底色">
          <span class="color-swatch" id="swatch-hilitecolor" style="background:#ff0"></span>
          <input type="color" id="btn-hilitecolor" value="#ffff00">
        </span>
        <span class="separator"></span>
        <button id="btn-format-painter" class="style-btn" data-tooltip="格式刷">🖌</button>
      </div>
      <div class="toolbar-actions" id="toolbar-insert" style="display:none">
        <button id="btn-checklist" class="style-btn" data-tooltip="插入清单">☑</button>
        <button id="btn-timestamp" class="style-btn" data-tooltip="插入日志时间">📅</button>
        <div class="dropdown-wrapper" id="dropdown-image">
          <button id="btn-insert-image" class="style-btn" data-tooltip="插入图片">🖼 ▾</button>
          <div class="dropdown-menu" id="dropdown-image-menu">
            <div class="menu-item" data-method="file">📁 从文件插入</div>
            <div class="menu-item" data-method="clipboard">📋 从剪贴板粘贴</div>
            <div class="menu-divider"></div>
            <div class="menu-item" data-method="fullscreen">🖥 全屏截图</div>
            <div class="menu-item" data-method="area">✂️ 框选截图</div>
            <div class="menu-item" data-method="window">🪟 窗口截图</div>
          </div>
        </div>
      </div>
      <div class="toolbar-actions" id="toolbar-edit" style="display:none">
        <button id="btn-find-open" class="style-btn" data-tooltip="查找替换 (Ctrl+F)">🔍</button>
        <span class="separator"></span>
        <button id="btn-strikethrough" class="style-btn" data-tooltip="删除线"><s>S</s></button>
        <button id="btn-remove-format" class="style-btn" data-tooltip="清除格式">⎚</button>
        <span class="separator"></span>
        <button id="btn-ordered-list" class="style-btn" data-tooltip="有序列表">≡</button>
        <button id="btn-unordered-list" class="style-btn" data-tooltip="无序列表">•</button>
        <button id="btn-indent" class="style-btn" data-tooltip="增加缩进">→</button>
        <button id="btn-outdent" class="style-btn" data-tooltip="减少缩进">←</button>
        <span class="separator"></span>
        <button id="btn-select-all" class="style-btn" data-tooltip="全选 (Ctrl+A)">▦</button>
      </div>
      <div class="toolbar-actions" id="toolbar-draw" style="display:none">
        <!-- 核心绘制工具 -->
        <button id="btn-tool-pencil" class="style-btn draw-tool-btn active" data-tooltip="铅笔" data-tool="pencil">✏</button>
        <button id="btn-tool-brush" class="style-btn draw-tool-btn" data-tooltip="画笔" data-tool="brush">🖌</button>
        <select id="btn-brush-size" title="画笔大小">
          <option value="2">2px</option>
          <option value="4">4px</option>
          <option value="6" selected>6px</option>
          <option value="10">10px</option>
          <option value="16">16px</option>
          <option value="24">24px</option>
        </select>
        <button id="btn-tool-eraser" class="style-btn draw-tool-btn" data-tooltip="橡皮" data-tool="eraser">🧹</button>
        <select id="btn-eraser-size" title="橡皮大小">
          <option value="10">10px</option>
          <option value="20" selected>20px</option>
          <option value="30">30px</option>
          <option value="40">40px</option>
        </select>
        <button id="btn-tool-fill" class="style-btn draw-tool-btn" data-tooltip="颜料桶" data-tool="fill">🪣</button>
        <span class="separator"></span>

        <!-- 选区工具 -->
        <div class="dropdown-wrapper" id="dropdown-select">
          <button id="btn-tool-select" class="style-btn draw-tool-btn" data-tooltip="选区" data-tool="select-rect">⬜ ▾</button>
          <div class="dropdown-menu" id="dropdown-select-menu">
            <div class="menu-item active" data-tool="select-rect">⬜ 矩形选框</div>
            <div class="menu-item" data-tool="select-lasso">〰 套索</div>
            <div class="menu-item" data-tool="select-wand">🪄 魔术棒</div>
          </div>
        </div>
        <span class="separator"></span>

        <!-- 颜色工具 -->
        <span class="color-label">主</span>
        <span class="color-btn" title="主颜色（左键绘制用）">
          <span class="color-swatch color-swatch-primary" id="swatch-primary" style="background:#000000"></span>
          <input type="color" id="btn-primary-color" value="#000000">
        </span>
        <span class="color-label">副</span>
        <span class="color-btn" title="副颜色（备用）">
          <span class="color-swatch color-swatch-secondary" id="swatch-secondary" style="background:#ffffff"></span>
          <input type="color" id="btn-secondary-color" value="#ffffff">
        </span>
        <button id="btn-color-swap" class="style-btn" data-tooltip="交换主副颜色">⇄</button>
        <button id="btn-tool-picker" class="style-btn draw-tool-btn" data-tooltip="取色器" data-tool="picker">💉</button>
        <span class="separator"></span>

        <!-- 形状工具 -->
        <div class="dropdown-wrapper" id="dropdown-shape">
          <button id="btn-tool-shape" class="style-btn draw-tool-btn" data-tooltip="图形" data-tool="shape-rect">▭ ▾</button>
          <div class="dropdown-menu" id="dropdown-shape-menu">
            <div class="menu-item active" data-tool="shape-rect">▭ 矩形</div>
            <div class="menu-item" data-tool="shape-ellipse">○ 圆形</div>
            <div class="menu-item" data-tool="shape-line">╱ 直线</div>
            <div class="menu-item" data-tool="shape-roundrect">▢ 圆角矩形</div>
          </div>
        </div>
        <span class="separator"></span>

        <button id="btn-tool-text" class="style-btn draw-tool-btn" data-tooltip="文字工具" data-tool="text"><b>T</b></button>
      </div>
      <div class="toolbar-actions" id="toolbar-image-edit" style="display:none">
        <span class="image-dim-label">宽:</span>
        <input type="number" id="img-width" class="dim-input" min="1" step="1" title="图片宽度 (px)">
        <button id="btn-lock-ratio" class="style-btn lock-btn locked" data-tooltip="锁定宽高比">🔗</button>
        <span class="image-dim-label">高:</span>
        <input type="number" id="img-height" class="dim-input" min="1" step="1" title="图片高度 (px)">
        <span class="separator"></span>
        <button id="btn-crop-image" class="style-btn" data-tooltip="裁剪图片">✂️ 裁剪</button>
        <span class="separator"></span>
        <button id="btn-restore-image" class="style-btn" data-tooltip="恢复原图" style="display:none">🔄 恢复</button>
      </div>
      <div class="toolbar-actions" id="toolbar-sync" style="display:none">
        <button id="btn-sync-pull" class="style-btn" data-tooltip="拉取远程更新">↓ 拉取</button>
        <button id="btn-sync-push" class="style-btn" data-tooltip="推送本地更改">↑ 推送</button>
        <span class="separator"></span>
        <button id="btn-sync-commit" class="style-btn" data-tooltip="提交本地变更">✓ 提交</button>
        <span class="separator"></span>
        <span id="sync-status-text" class="sync-status-label">未配置</span>
      </div>
    </div>

    <!-- 查找替换栏（在 editor-area 外部，不受 showEditor/hideEditor 影响） -->
    <div class="find-bar" id="find-bar">
      <input type="text" id="find-input" placeholder="查找...">
      <span class="find-count" id="find-count"></span>
      <button id="btn-find-prev" title="上一个 (Shift+Enter)">▲</button>
      <button id="btn-find-next" title="下一个 (Enter)">▼</button>
      <button id="btn-find-case" title="大小写敏感">Aa</button>
      <span class="find-separator"></span>
      <input type="text" id="replace-input" class="replace-input" placeholder="替换为...">
      <button id="btn-replace" title="替换当前">替换</button>
      <button id="btn-replace-all" title="全部替换">全部替换</button>
      <span class="find-separator"></span>
      <button class="find-close" id="btn-find-close" title="关闭 (Escape)">✕</button>
    </div>

    <div class="editor-area" id="editor-area">
      <div class="no-note">选择或新建一篇笔记开始编辑</div>
    </div>

    <!-- 缩放控件（右下角浮动，在 main-area 中不受 showEditor 影响） -->
    <div class="zoom-controls" id="zoom-controls">
      <button id="btn-zoom-out" class="style-btn" title="缩小">−</button>
      <span id="zoom-label">100%</span>
      <button id="btn-zoom-in" class="style-btn" title="放大">+</button>
    </div>

    <div class="status-bar">
      <span id="status-left">就绪</span>
      <span id="status-right"></span>
    </div>
  </div>

  <!-- 图片裁剪遮罩 -->
  <div class="crop-overlay" id="crop-overlay">
    <div class="crop-backdrop"></div>
    <div class="crop-workspace">
      <canvas id="crop-canvas"></canvas>
      <div class="crop-rect" id="crop-rect"></div>
    </div>
    <div class="crop-toolbar">
      <button id="btn-crop-confirm">确认裁剪</button>
      <button id="btn-crop-cancel">取消</button>
    </div>
  </div>

  <!-- 右键上下文菜单（笔记项） -->
  <div class="context-menu" id="context-menu">
    <div class="menu-item" data-action="rename">✏️ 重命名</div>
    <div class="menu-item" data-action="duplicate">📋 复制</div>
    <div class="menu-item" data-action="cut">✂️ 剪切</div>
    <div class="menu-divider"></div>
    <div class="menu-item danger" data-action="delete">🗑️ 删除</div>
  </div>

  <!-- 右键上下文菜单（侧边栏空白区域） -->
  <div class="context-menu" id="context-menu-empty">
    <div class="menu-item" data-action="new-note">📝 新建笔记</div>
    <div class="menu-item" data-action="import-note">📥 导入笔记</div>
  </div>

  <!-- 右键上下文菜单（回收站笔记） -->
  <div class="context-menu" id="context-menu-trash">
    <div class="menu-item" data-action="restore">↩ 恢复</div>
    <div class="menu-divider"></div>
    <div class="menu-item danger" data-action="delete-permanent">🗑 永久删除</div>
  </div>

  <!-- 窗口截图选择器 -->
  <div class="window-picker-overlay" id="window-picker-overlay">
    <div class="window-picker-dialog">
      <div class="window-picker-header">
        <span>选择一个窗口截图</span>
        <button class="window-picker-close" id="window-picker-close">×</button>
      </div>
      <div class="window-picker-list" id="window-picker-list"></div>
    </div>
  </div>

  <!-- 冲突对比预览 -->
  <div class="conflict-preview-overlay" id="conflict-preview-overlay">
    <div class="conflict-preview-header">
      <span id="conflict-preview-title">对比冲突</span>
      <div class="conflict-preview-actions">
        <button class="resolve-btn local" data-strategy="local">保留本地</button>
        <button class="resolve-btn remote" data-strategy="remote">保留远程</button>
        <button class="resolve-btn both" data-strategy="both">保留双方</button>
        <button class="conflict-preview-close" id="conflict-preview-close">&times;</button>
      </div>
    </div>
    <div class="conflict-diff-panels">
      <div class="conflict-diff-panel local-panel" id="conflict-local-panel"></div>
      <div class="conflict-diff-panel remote-panel" id="conflict-remote-panel"></div>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-dialog">
      <div class="settings-header">
        <h2>设置</h2>
        <button class="settings-close" id="settings-close">&times;</button>
      </div>
      <div class="settings-body">
        <!-- 云同步 -->
        <div class="settings-section">
          <h3 class="settings-section-title">☁ Git 云端同步</h3>
          <div class="toggle-row">
            <span class="toggle-label">启用云同步</span>
            <label class="toggle-switch">
              <input type="checkbox" id="settings-sync-enabled">
              <span class="toggle-track"></span>
              <span class="toggle-thumb"></span>
            </label>
          </div>

          <!-- Git 配置组 -->
          <div class="settings-group" id="settings-git-group">
            <p class="settings-group-title">Git 仓库配置</p>
            <div class="settings-row">
              <label>远程仓库 URL</label>
              <input type="url" id="settings-git-remote-url" placeholder="https://github.com/user/repo.git">
            </div>
            <div class="settings-row">
              <label>分支</label>
              <input type="text" id="settings-git-branch" placeholder="main">
            </div>
            <div class="settings-row">
              <label>Access Token</label>
              <input type="password" id="settings-git-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
            </div>
            <div class="settings-row">
              <label>作者名</label>
              <input type="text" id="settings-git-author-name" placeholder="Your Name">
            </div>
            <div class="settings-row">
              <label>作者邮箱</label>
              <input type="email" id="settings-git-author-email" placeholder="email@example.com">
            </div>
            <div class="settings-row">
              <button class="btn-test-connection" id="btn-test-connection">测试连接</button>
              <span class="test-result" id="test-connection-result"></span>
            </div>
          </div>

          <!-- 自动同步 -->
          <div class="toggle-row">
            <span class="toggle-label">启用自动同步</span>
            <label class="toggle-switch">
              <input type="checkbox" id="settings-auto-sync">
              <span class="toggle-track"></span>
              <span class="toggle-thumb"></span>
            </label>
          </div>
          <div class="settings-row" id="sync-interval-row" style="display:none">
            <label>同步间隔</label>
            <input type="number" id="settings-sync-interval" min="1" max="1440" value="15">
            <span style="font-size:0.82rem;color:#888;">分钟</span>
          </div>
        </div>

        <!-- 通用 -->
        <div class="settings-section">
          <h3 class="settings-section-title">📄 文件</h3>
          <div class="settings-row">
            <label>笔记扩展名</label>
            <select id="settings-file-extension">
              <option value=".html">.html</option>
              <option value=".txt">.txt</option>
            </select>
          </div>
        </div>
      </div>
      <div class="settings-footer">
        <button class="btn-cancel" id="settings-cancel">取消</button>
        <button class="btn-save" id="settings-save">保存</button>
      </div>
    </div>
  </div>

  <!-- 隐藏的文件选择器用于导入 -->
  <input type="file" id="import-file-input" accept=".txt,.md,.markdown" style="display:none">

  <!-- JS 文件：按依赖顺序加载 -->
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/sidebar-render.js"></script>
  <script src="js/sidebar-ops.js"></script>
  <script src="js/editor-core.js"></script>
  <script src="js/editor-events.js"></script>
  <script src="js/editor-markers.js"></script>
  <script src="js/insert-features.js"></script>
  <script src="js/image-resize.js"></script>
  <script src="js/style-toolbar.js"></script>
  <script src="js/context-menus.js"></script>
  <script src="js/view-switching.js"></script>
  <script src="js/drawing-tools.js"></script>
  <script src="js/drawing-ui.js"></script>
  <script src="js/settings-ui.js"></script>
  <script src="js/sync-ui.js"></script>
  <script src="js/conflict-ui.js"></script>
  <script src="js/edit-toolbar.js"></script>
  <script src="js/init.js"></script>
</body>
</html>
